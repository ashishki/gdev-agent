services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: gdev
      POSTGRES_USER: gdev_app
      POSTGRES_PASSWORD: gdev-app-pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gdev_app -d gdev"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - gdev

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - gdev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - gdev

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      agent:
        condition: service_healthy
    networks:
      - gdev

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - gdev

  n8n:
    image: n8nio/n8n:1.x
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
    depends_on:
      agent:
        condition: service_healthy
    networks:
      - gdev

networks:
  gdev:
    driver: bridge
