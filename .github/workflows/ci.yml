name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: Tests + Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gdev_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -e .

      - name: Lint (ruff)
        run: ruff check app/ tests/ scripts/ eval/

      - name: Format check (ruff format)
        run: ruff format --check app/ tests/ scripts/ eval/

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: test-key
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/gdev_test
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/gdev_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-at-least-32-characters-long
        run: python -m pytest tests/ -q --tb=short
