  priorities:

    - id: "P1-4"
      title: "Enforce tenant_id presence before LLM call in webhook handler"
      rationale: >
        _enforce_budget() silently no-ops when tenant_id is None or unparseable (agent.py:470-488).
        Any webhook request without a valid tenant_id bypasses the budget guard and proceeds to
        make LLM calls unrestricted. CODEX_PROMPT §AGENT PIPELINE SAFETY mandates:
        "Budget check must run BEFORE every LLM call." This invariant is violated when tenant_id
        is absent. Since the webhook is HMAC-protected, the fix belongs at the HTTP layer where
        the tenant_id should have been resolved via X-Tenant-Slug, not inside _enforce_budget.
      change_strategy: "surgical"

      targets:
        files:
          - app/main.py
          - tests/test_main.py
        components:
          - POST /webhook route handler (main.py:169-199)
          - _enforce_budget no-op guard (agent.py:470-488) — add comment only, do NOT change behavior

      tasks:
        - >
          In the POST /webhook route handler (app/main.py), after resolving the tenant context
          from request.state or payload, add a guard:
            resolved_tenant_id = getattr(request.state, "tenant_id", None) or payload.tenant_id
            if not resolved_tenant_id:
                raise HTTPException(status_code=400, detail="tenant_id is required")
          This ensures _enforce_budget always receives a non-None tenant_id from authenticated
          webhook calls. Place this check BEFORE app.state.agent.process_webhook(payload, ...).
        - >
          In app/agent.py:_enforce_budget(), add a comment above the `if tenant_uuid is None`
          guard explaining it is a unit-test fallback (no DB session factory) and that production
          calls always have a valid tenant_uuid because main.py validates it first. Do NOT change
          the behavior — the guard is still needed for unit tests.
        - >
          In tests/test_main.py, add two test cases:
            - POST /webhook with missing tenant_id (no JWT context, no payload tenant_id) → HTTP 400.
            - POST /webhook with an invalid (non-UUID) tenant_id string → HTTP 400.

      acceptance_criteria:
        - "POST /webhook without tenant_id returns HTTP 400 with detail='tenant_id is required'."
        - "POST /webhook with a valid tenant_id but exhausted budget returns HTTP 429."
        - "No regression in existing 88 passing tests."
        - "_enforce_budget still has the no-op guard for unit tests; comment explains why."

      tests:
        - ".venv/bin/pytest tests/test_main.py -x -q"
        - ".venv/bin/pytest tests/ -x -q"

      notes:
        - >
          The guard in main.py must run AFTER the dedup check (to avoid returning 400 on a
          legitimate cached response) but BEFORE the agent call.
        - >
          Do NOT raise 401 — the request is authenticated (HMAC verified). The missing tenant_id
          is a payload validation error, not an auth error.

    - id: "P2-7"
      title: "Hash reviewer field before storing in log events and AuditLogEntry"
      rationale: >
        app/agent.py stores the raw reviewer string (typically a Telegram user ID) in three places:
        (1) pending_rejected log event (line 264), (2) pending_approved log event (line 282),
        (3) AuditLogEntry.approved_by (line 299) which is written to Google Sheets.
        data-map.md §2 specifies audit_log.approved_by = 'auto' or reviewer email_hash.
        Storing raw Telegram IDs violates dev-standards §PII and the data-map contract.
      change_strategy: "surgical"

      targets:
        files:
          - app/agent.py
          - docs/data-map.md
        components:
          - AgentService.approve() — pending_rejected and pending_approved log events
          - AuditLogEntry construction in approve()

      tasks:
        - >
          In app/agent.py, at the top of approve(), compute a hashed reviewer identifier:
            reviewer_hash = (
                hashlib.sha256((request.reviewer or "").encode()).hexdigest()[:16]
                if request.reviewer
                else None
            )
          Use reviewer_hash in all three storage sites (lines 264, 282, 299) instead of
          request.reviewer.
        - >
          Confirm hashlib is already imported (it is — app/agent.py:7). No new import needed.
        - >
          In docs/data-map.md §2, update the audit_log.approved_by comment to read:
            approved_by: TEXT -- 'auto' or SHA-256[:16] hash of reviewer identity
        - >
          Add one unit test to tests/test_agent.py verifying that when approve() is called
          with reviewer="raw_user_123", the stored log event payload does NOT contain
          "raw_user_123" and DOES contain a hex string of length 16.

      acceptance_criteria:
        - "No raw reviewer string appears in any store.log_event() payload."
        - "AuditLogEntry.approved_by stores the SHA-256[:16] hash, not the raw reviewer."
        - "If reviewer is None, approved_by is None (not 'None' the string)."
        - "Unit test asserting raw reviewer absent from log event passes."

      tests:
        - ".venv/bin/pytest tests/test_agent.py -x -q"
        - ".venv/bin/pytest tests/ -x -q"

      notes:
        - >
          SHA-256[:16] (64-bit hex prefix) is sufficient for audit correlation while
          preventing direct PII exposure. This follows the pattern used for user_id_hash
          in audit_log (store.py:125) and email hashing in the auth rate limiter.

