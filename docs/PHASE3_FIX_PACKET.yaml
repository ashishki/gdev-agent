          Create app/async_utils.py with the shared _run_blocking function:
            def run_blocking(coroutine):
                """Run an async coroutine synchronously, bridging to a new event loop if needed."""
                try:
                    asyncio.get_running_loop()
                except RuntimeError:
                    return asyncio.run(coroutine)
                queue: Queue[tuple[bool, object]] = Queue(maxsize=1)
                def _target() -> None:
                    try:
                        result = asyncio.run(coroutine)
                        queue.put((True, result))
                    except Exception as exc:
                        queue.put((False, exc))
                thread = threading.Thread(target=_target, daemon=True)
                thread.start()
                ok, data = queue.get()
                thread.join()
                if ok:
                    return data
                raise data
        - >
